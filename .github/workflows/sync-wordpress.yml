name: "Raqqa Full Automated Sync"

on:
  schedule:
    # التنفيذ مرتين يومياً (كل 12 ساعة)
    - cron: "0 6,18 * * *" 
  workflow_dispatch: # يتيح لك تشغيل الأكشن يدوياً من لوحة GitHub Actions

jobs:
  run_sync:
    runs-on: ubuntu-latest
    steps:
      - name: "Trigger Raqqa Backend API"
        run: |
          curl -X GET "https://raqqa-hjl8.vercel.app/api/sync-wordpress?sync=wordpress" \
          -H "zazotona: 12sonds25"

name: "Raqqa Full Automated Sync"

on:
  schedule:
    - cron: "0 6,18 * * *" # مرتين يومياً
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  run_sync:
    runs-on: ubuntu-latest
    steps:
      - name: "Trigger Raqqa Backend API"
        run: |
          curl -X GET "https://raqqa-hjl8.vercel.app/api/send-fcm?sync=wordpress" \
          -H "zazotona: 12sonds25"

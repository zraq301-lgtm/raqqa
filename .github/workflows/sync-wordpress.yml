name: "Raqqa Smart Sync (Neon & WordPress)"

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  sync_process:
    runs-on: ubuntu-latest
    steps:
      - name: "Run Raqqa Unified Sync"
        uses: actions/github-script@v7
        with:
          script: |
            const vercelUrl = "https://raqqa-v6cd.vercel.app/api/sync-wordpress";
            const headers = { 
              "Content-Type": "application/json", 
              "zazotona": "12sonds25" 
            };

            // وظيفة مساعدة للانتظار لتجنب ضغط السيرفر
            const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            try {
              console.log("--- Step 1: Fetching Scheduled Notifications & Syncing ---");
              
              const neonRes = await fetch(`${vercelUrl}?sync=wordpress`, { 
                method: "GET", 
                headers 
              });

              const responseText = await neonRes.text();
              
              if (!neonRes.ok) {
                console.error(`Vercel Server Error (500): ${responseText}`);
                console.log("Action will continue to Step 2 despite Step 1 failure...");
              } else {
                console.log("Step 1 Success:", responseText);
              }

              // انتظار ثانية واحدة قبل البدء في الخطوة التالية
              await wait(1000);

              // --- الخطوة 2: فحص وردبريس ---
              console.log("--- Step 2: Checking WordPress Categories ---");
              const categoryIds = ["189211019", "788402012", "768006428", "347212703"];
              const siteDomain = "raqqastor3.wordpress.com";

              for (const catId of categoryIds) {
                const wpUrl = `https://public-api.wordpress.com/wp/v2/sites/${siteDomain}/posts?categories=${catId}&per_page=1`;
                
                try {
                  const wpResponse = await fetch(wpUrl);
                  if (!wpResponse.ok) throw new Error(`WP API Error for cat ${catId}`);

                  const posts = await wpResponse.json();
                  
                  if (posts && posts.length > 0) {
                    const post = posts[0];
                    const cleanTitle = post.title.rendered.replace(/<\/?[^>]+(>|$)/g, "").trim();
                    
                    const payload = {
                      type: "wordpress_article",
                      postId: String(post.id),
                      title: "✨ مقال جديد: " + cleanTitle,
                      body: "اكتشفي أسرار الأناقة والجمال الجديدة في رقة..",
                      image: post.jetpack_featured_media_url || "",
                      category: String(catId)
                    };

                    const postRes = await fetch(vercelUrl, {
                      method: "POST",
                      headers,
                      body: JSON.stringify(payload)
                    });

                    if (postRes.ok) {
                      console.log(`✅ Success: Post ${post.id} from category ${catId} synced.`);
                    } else {
                      console.warn(`⚠️ Vercel rejected post ${post.id} with status ${postRes.status}`);
                    }
                  }
                } catch (catError) {
                  console.error(`Error processing category ${catId}:`, catError.message);
                }
                
                // انتظار بسيط بين الفئات
                await wait(500);
              }

            } catch (error) {
              console.error("Critical Workflow Error:", error.message);
              core.setFailed(error.message);
            }

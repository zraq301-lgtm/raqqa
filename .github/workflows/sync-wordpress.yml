name: "Raqqa Smart Sync (Neon & WordPress)"

on:
  schedule:
    # التنفيذ مرتين يومياً (الساعة 6 صباحاً و 6 مساءً بالتوقيت العالمي)
    - cron: "0 6,18 * * *"
  workflow_dispatch: # يتيح لك تشغيل الأكشن يدوياً للتجربة من تبويب Actions

jobs:
  sync_process:
    runs-on: ubuntu-latest
    steps:
      - name: "Run Raqqa Unified Sync"
        uses: actions/github-script@v7
        with:
          script: |
            // الرابط الجديد الذي طلبته
            const vercelUrl = "https://raqqa-v6cd.vercel.app/api/sync-wordpress";
            const headers = { 
              "Content-Type": "application/json", 
              "zazotona": "12sonds25" 
            };

            try {
              // --- الخطوة 1: جلب إشعارات نيون المجدولة والمزامنة (GET) ---
              console.log("--- Step 1: Fetching Scheduled Notifications & Syncing ---");
              const neonRes = await fetch(`${vercelUrl}?sync=wordpress`, { 
                method: "GET", 
                headers 
              });
              const neonData = await neonRes.json();
              console.log("Neon Sync Result:", JSON.stringify(neonData));

              // --- الخطوة 2: فحص وردبريس وإرسال المقالات مباشرة (POST) ---
              console.log("--- Step 2: Checking WordPress Categories ---");
              const categoryIds = ["189211019", "788402012", "768006428", "347212703"];
              const siteDomain = "raqqastor3.wordpress.com";

              for (const catId of categoryIds) {
                console.log(`Checking Category: ${catId}...`);
                
                const wpUrl = `https://public-api.wordpress.com/wp/v2/sites/${siteDomain}/posts?categories=${catId}&per_page=1`;
                const wpResponse = await fetch(wpUrl);
                const posts = await wpResponse.json();

                if (posts && posts.length > 0) {
                  const post = posts[0];
                  
                  // تنظيف العنوان من وسوم HTML
                  const cleanTitle = post.title.rendered.replace(/<\/?[^>]+(>|$)/g, "").trim();
                  
                  console.log(`Found Post: "${cleanTitle}". Sending to Vercel API...`);

                  const payload = {
                    type: "wordpress_article",
                    postId: String(post.id),
                    title: "✨ مقال جديد: " + cleanTitle,
                    body: "اكتشفي أسرار الأناقة والجمال الجديدة في رقة..",
                    image: post.jetpack_featured_media_url || "",
                    category: String(catId)
                  };

                  const pushRes = await fetch(vercelUrl, {
                    method: "POST",
                    headers,
                    body: JSON.stringify(payload)
                  });

                  const pushData = await pushRes.json();
                  console.log(`Push Result for Category ${catId}:`, JSON.stringify(pushData));
                } else {
                  console.log(`No new posts found in category ${catId}.`);
                }
              }

              console.log("--- All Sync Tasks Completed Successfully ---");

            } catch (error) {
              console.error("Critical Sync Error:", error.message);
              core.setFailed(error.message);
            }

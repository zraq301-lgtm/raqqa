name: "Raqqa Smart Sync (Neon & WordPress)"

on:
  schedule:
    # التنفيذ مرتين يومياً (الساعة 6 صباحاً و 6 مساءً بالتوقيت العالمي)
    - cron: "0 6,18 * * *"
  workflow_dispatch: # يتيح تشغيل الأكشن يدوياً للتجربة

jobs:
  sync_process:
    runs-on: ubuntu-latest
    steps:
      - name: "Run Raqqa Unified Sync"
        uses: actions/github-script@v7
        with:
          script: |
            const syncUrl = "https://raqqa-v6cd.vercel.app/api/sync-wordpress";
            const fcmPushUrl = "https://raqqa-hjl8.vercel.app/api/send-fcm";
            
            const headers = { 
              "Content-Type": "application/json", 
              "zazotona": "12sonds25" 
            };

            const CATEGORY_MAP = {
              '788594722': 'العناية بالبشرة',
              '788519318': 'الأناقة',
              '768006428': 'الصحة',
              '788485478': 'الأمومة',
              '10783713': 'عام', 
              '788402012': 'الرشاقة',
              '347212703': 'وصفات'
            };

            const categoryIds = Object.keys(CATEGORY_MAP);

            try {
              // --- الخطوة 1: مزامنة مقالات وردبريس مع قاعدة البيانات ---
              console.log("--- Step 1: Syncing WordPress with Database ---");
              const syncRes = await fetch(`${syncUrl}?sync=wordpress`, { 
                method: "GET", 
                headers 
              });

              const syncText = await syncRes.text(); // نجلب الاستجابة كنص أولاً لتجنب الخطأ
              
              try {
                const syncData = JSON.parse(syncText);
                console.log("Sync Response:", JSON.stringify(syncData));
              } catch (e) {
                console.error("Failed to parse Sync Response as JSON. Server returned raw text:");
                console.error(syncText);
                // لا نوقف العمل هنا، بل ننتقل للخطوة التالية إذا أمكن
              }

              // --- الخطوة 2: فحص وردبريس وإرسال الإشعارات ---
              console.log("--- Step 2: Processing Categories and Pushing to FCM ---");
              const siteDomain = "raqqastor3.wordpress.com";

              for (const catId of categoryIds) {
                console.log(`Checking Category: ${CATEGORY_MAP[catId]} (${catId})...`);
                
                const wpUrl = `https://public-api.wordpress.com/wp/v2/sites/${siteDomain}/posts?categories=${catId}&per_page=1`;
                const wpResponse = await fetch(wpUrl);
                
                if (!wpResponse.ok) {
                    console.log(`Skip: Could not fetch WP for category ${catId}`);
                    continue;
                }

                const posts = await wpResponse.json();

                if (posts && Array.isArray(posts) && posts.length > 0) {
                  const post = posts[0];
                  const cleanTitle = post.title.rendered.replace(/<\/?[^>]+(>|$)/g, "").trim();
                  
                  console.log(`New Post Found: "${cleanTitle}". Sending to FCM API...`);

                  const payload = {
                    type: "wordpress_article",
                    postId: String(post.id),
                    title: "✨ " + CATEGORY_MAP[catId] + ": " + cleanTitle,
                    body: "مقال جديد في رقة ينتظرك، اكتشفي التفاصيل الآن..",
                    image: post.jetpack_featured_media_url || "",
                    category: String(catId)
                  };

                  const pushRes = await fetch(fcmPushUrl, {
                    method: "POST",
                    headers,
                    body: JSON.stringify(payload)
                  });

                  const pushData = await pushRes.json();
                  console.log(`FCM Result for ${CATEGORY_MAP[catId]}:`, JSON.stringify(pushData));
                } else {
                  console.log(`No new content in ${CATEGORY_MAP[catId]}.`);
                }
              }

              console.log("--- All Sync & Push Tasks Completed ---");

            } catch (error) {
              console.error("Critical Workflow Error:", error.message);
              core.setFailed(error.message);
            }

name: "Raqqa Smart Sync (Neon & WordPress)"

on:
  schedule:
    # التنفيذ مرتين يومياً (الساعة 6 صباحاً و 6 مساءً بالتوقيت العالمي)
    - cron: "0 6,18 * * *"
  workflow_dispatch: # يتيح تشغيل الأكشن يدوياً للتجربة

jobs:
  sync_process:
    runs-on: ubuntu-latest
    steps:
      - name: "Run Raqqa Unified Sync"
        uses: actions/github-script@v7
        with:
          script: |
            // رابط الـ API الموحد الذي يحتوي على نظام الحماية ومنع التكرار
            const fcmPushUrl = "https://raqqa-hjl8.vercel.app/api/send-fcm";
            
            const headers = { 
              "Content-Type": "application/json", 
              "zazotona": "12sonds25" 
            };

            const CATEGORY_MAP = {
              '788594722': 'العناية بالبشرة',
              '788519318': 'الأناقة',
              '768006428': 'الصحة',
              '788485478': 'الأمومة',
              '10783713': 'عام', 
              '788402012': 'الرشاقة',
              '347212703': 'وصفات'
            };

            const categoryIds = Object.keys(CATEGORY_MAP);
            const siteDomain = "raqqastor3.wordpress.com";

            try {
              console.log("--- Starting Smart Sync Process ---");

              for (const catId of categoryIds) {
                console.log(`Checking Category: ${CATEGORY_MAP[catId]}...`);
                
                // جلب آخر مقال من كل قسم (مع تضمين الصور _embed)
                const wpUrl = `https://public-api.wordpress.com/wp/v2/sites/${siteDomain}/posts?categories=${catId}&per_page=1&_embed`;
                const wpResponse = await fetch(wpUrl);
                
                if (!wpResponse.ok) continue;

                const posts = await wpResponse.json();

                if (posts && Array.isArray(posts) && posts.length > 0) {
                  const post = posts[0];
                  
                  // استخراج الصورة بشكل احترافي
                  const featuredImage = post.jetpack_featured_media_url || 
                                       (post._embedded && post._embedded['wp:featuredmedia']?.[0]?.source_url) || "";

                  console.log(`Sending Post ID ${post.id} to API. API will decide if it's new...`);

                  // إرسال البيانات للـ API
                  // ملاحظة: الـ API سيفحص قاعدة البيانات، إذا وجد الـ ID فلن يرسل تنبيهاً ولن يستهلك AI
                  const payload = {
                    type: "wordpress_article",
                    postId: String(post.id),
                    title: post.title.rendered,
                    body: post.excerpt.rendered.replace(/<\/?[^>]+(>|$)/g, "").trim(),
                    image: featuredImage,
                    category: String(catId)
                  };

                  const pushRes = await fetch(fcmPushUrl, {
                    method: "POST",
                    headers,
                    body: JSON.stringify(payload)
                  });

                  const result = await pushRes.json();
                  
                  if (result.skipped) {
                    console.log(`Result: Post already exists in Database. No notification sent.`);
                  } else {
                    console.log(`Result: New post sent successfully! MessageID: ${result.messageId}`);
                  }
                }
              }

              console.log("--- Workflow Finished ---");

            } catch (error) {
              console.error("Critical Error:", error.message);
              core.setFailed(error.message);
            }

name: Auto Update Products to Neon

on:
  schedule:
    - cron: '0 0 * * *' # يعمل تلقائياً كل يوم الساعة 12 منتصف الليل
  workflow_dispatch: # يسمح لك بتشغيله يدوياً الآن لتجربته

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Database Driver
        # قمنا باستبدال npm install الكاملة بتثبيت المكتبة المطلوبة فقط لتسريع العمل وتجنب أخطاء البناء
        run: npm install postgres

      - name: Sync Data to Neon
        env:
          # تأكد أن هذا الرابط موجود في GitHub Secrets بنفس الاسم
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
        run: node updateProducts.cjs

name: Auto Update Products to Neon
on:
  schedule:
    - cron: '0 0 * * *' # يومياً منتصف الليل
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate # سيقرأ الملف من مجلد prisma تلقائياً

      - name: Sync Data
        env:
          ADMITAD_BASE64: ${{ secrets.ADMITAD_BASE64 }}
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
        run: node updateProducts.cjs

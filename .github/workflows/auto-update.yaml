name: Auto Update Products to Neon

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Database Driver
        # نستخدم --no-package-lock لتجنب أي مشاكل في ملفات المشروع الأصلية
        run: npm install postgres --no-package-lock

      - name: Sync Data to Neon
        env:
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
        run: node updateProducts.cjs

name: Roqa Production Build Signed (Absolute Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد البيئة (Node 22 & Java 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. تنظيف وتثبيت المكتبات
        run: |
          rm -rf android
          npm install --legacy-peer-deps
          npm install onesignal-cordova-plugin @capacitor/push-notifications @capacitor/local-notifications @capacitor/live-updates --save --legacy-peer-deps
          npm run build --if-present

      - name: 🚀 4. دفع التحديث المباشر إلى Ionic Appflow
        run: |
          npm install -g @ionic/cli
          ionic deploy build \
            --app-id="0cdc2a84" \
            --channel="Production" \
            --token="${{ secrets.IONIC_SECRET }}" \
            --commit-msgs="Auto Update: ${{ github.event.head_commit.message }}"

      - name: 5. إضافة منصة أندرويد ومزامنتها
        run: |
          npx cap config set webDir dist_web
          npx cap add android
          npx cap sync android

      - name: 6. حقن ملف google-services.json
        shell: bash
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": {
              "project_number": "162488255991",
              "project_id": "raqqa-43dc8",
              "storage_bucket": "raqqa-43dc8.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2",
                  "android_client_info": { "package_name": "com.raqqa.app" }
                },
                "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: 7. الحل الجذري لتعارضات التشفير (Nuclear Fix)
        run: |
          APP_BUILD_GRADLE="android/app/build.gradle"
          PROJECT_BUILD_GRADLE="android/build.gradle"
          
          # 1. إجبار استبدال المكتبة المسببة للأزمة في كل مكان
          echo "
          subprojects {
              project.configurations.all {
                  resolutionStrategy.eachDependency { details ->
                      if (details.requested.group == 'org.bouncycastle') {
                          details.useVersion '1.77'
                      }
                  }
              }
          }" >> $PROJECT_BUILD_GRADLE

          # 2. تعديل Manifest وتغيير اسم الحزمة
          MANIFEST=$(find android -name "AndroidManifest.xml" | grep "main" | head -n 1)
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/package="com.roqa.app"/package="com.raqqa.app"/' $MANIFEST
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: 8. بناء الملفات مع تخطي مشاكل الـ Jar
        run: |
          # حذف كاش الـ Jar اللعين قبل الثانية الصفر
          rm -rf /home/runner/.gradle/caches/jars-9/
          cd android
          chmod +x gradlew
          # تشغيل البناء مع أوامر صارمة لمنع استخدام الكاش القديم
          ./gradlew clean assembleRelease --no-daemon --no-build-cache --stacktrace

      - name: 9. التوقيع الرقمي (Keystore)
        run: |
          keytool -genkey -v -keystore roqa_release.jks -alias roqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" \
            -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          APK_RAW=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks roqa_release.jks \
            --ks-pass pass:"roqa_pass_2026" --out Roqa-Final-Signed.apk "$APK_RAW"
          
          AAB_RAW=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -keystore roqa_release.jks -storepass "roqa_pass_2026" "$AAB_RAW" roqa_alias
          cp "$AAB_RAW" Roqa-Final-Signed.aab

      - name: 10. رفع الملفات الجاهزة للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Roqa-Production-Package
          path: |
            Roqa-Final-Signed.apk
            Roqa-Final-Signed.aab
            roqa_release.jks

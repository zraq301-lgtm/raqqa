name: Roqa Final Protected Build & Live Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: 1. جلب الكود (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. إعداد البيئة (Node & Java)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. بناء الويب وتجهيز ملفات التحديث (Live Update)
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          echo "{\"version\": ${{ github.run_number }}}" > dist_web/version.json
          echo "{\"version\": ${{ github.run_number }}}" > version.json
          # ضغط محتويات مجلد dist_web فقط
          cd dist_web && zip -r ../update.zip . && cd ..

      - name: 4. إعداد أندرويد وحقن الـ Plugins برمجياً
        run: |
          rm -rf android
          npx cap config set webDir dist_web
          npx cap add android
          
          # إعداد ملفات Gradle الرئيسية
          cat <<EOF > android/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath 'com.google.gms:google-services:4.4.1'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # إعداد ملف build.gradle للتطبيق
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'com.google.gms.google-services'

          android {
              namespace "com.raqqa.app"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.raqqa.app"
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0.${{ github.run_number }}"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation project(':capacitor-android')
              implementation project(':capacitor-cordova-android-plugins')
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.firebase:firebase-messaging:24.0.0"
              implementation "androidx.core:core-splashscreen:1.0.1"
              implementation "com.google.android.material:material:1.10.0"
          }
          EOF

          # تسجيل Plugin التحديث الهوائي يدوياً لحل مشكلة "Not Implemented"
          mkdir -p android/app/src/main/java/com/raqqa/app/
          cat <<EOF > android/app/src/main/java/com/raqqa/app/MainActivity.java
          package com.raqqa.app;
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          import ee.forgr.capacitor_updater.CapacitorUpdaterPlugin;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  registerPlugin(CapacitorUpdaterPlugin.class);
              }
          }
          EOF

          # إضافة صلاحيات الإنترنت للمانيفست
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' android/app/src/main/AndroidManifest.xml

          npx cap sync android

      - name: 5. ضبط الهوية وملف Firebase
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF
          sed -i 's/app_name">.*</app_name">رقة</g' android/app/src/main/res/values/strings.xml || echo "Strings.xml not found"

      - name: 6. البناء والتوقيع النهائي (APK & AAB)
        run: |
          # إنشاء مفتاح التوقيع
          keytool -genkey -v -keystore release.keystore -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" \
            -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          cd android
          chmod +x gradlew
          # تشغيل البناء مع تمرير معاملات التوقيع مباشرة
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password=roqa_pass_2026 \
            -Pandroid.injected.signing.key.alias=raqqa_alias \
            -Pandroid.injected.signing.key.password=roqa_pass_2026 \
            --stacktrace

      - name: 7. رفع الملفات إلى GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Roqa Build v${{ github.run_number }}
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
            update.zip
          body: "إصدار رقم ${{ github.run_number }} - تم حل مشكلة تعريف المكتبة وإضافة تصريحات الإنترنت."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 8. تحديث فرع التحديثات (Updates)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cp version.json $HOME/version.json
          cp update.zip $HOME/update.zip
          git fetch origin updates || true
          git checkout -B updates
          git rm -rf . --ignore-unmatch
          cp $HOME/version.json .
          cp $HOME/update.zip .
          git add version.json update.zip
          git commit -m "Live Update: Build ${{ github.run_number }}"
          git push origin updates --force

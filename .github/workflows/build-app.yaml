name: "Roqa Clean Production Build"

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17 (Required for Gradle 8+)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 4. Deep Clean & Install Dependencies
        run: |
          # تنظيف جذري للمجلدات التي قد تحتوي على ملفات تالفة
          rm -rf node_modules package-lock.json android ios dist_web
          
          # تثبيت المكتبات مع تجاهل الصراعات القديمة
          npm install --legacy-peer-deps
          
          # بناء نسخة الويب
          npm run build

      - name: 5. Reconstruct Android Project (Zero-Footprint)
        run: |
          # إضافة منصة أندرويد من الصفر لضمان مانيفست نظيف 100%
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: 6. Fix Android Permissions (Auto-Injection)
        run: |
          # هذا السطر يضمن إضافة أذونات تسجيل الصوت والإنترنت بشكل صحيح في المانيفست الجديد
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml

      - name: 7. Build Signed Release APK
        run: |
          cd android
          chmod +x gradlew
          # تنظيف الكاش الخاص بـ Gradle قبل البدء
          ./gradlew clean
          ./gradlew assembleRelease

      - name: 8. Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Roqa-Clean-Release
          path: android/app/build/outputs/apk/release/app-release.apk

name: Raqqa Final Shield Fix (Production Build)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - [cite_start]name: 2. إعداد البيئة (Java 17 & Node 22) [cite: 2]
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - [cite_start]name: 3. تثبيت المكتبات وتوليد الأيقونات [cite: 3, 4]
        run: |
          rm -rf android
          npm install --legacy-peer-deps
          # تثبيت أدوات الأصول والاشعارات [cite: 3]
          npm install @capacitor/assets @capacitor/live-updates @capacitor/push-notifications @capacitor/local-notifications --save-dev --legacy-peer-deps
          npm run build --if-present

      - name: 🚀 4. تحديث Appflow (Live Update)
        run: |
          npm install -g @ionic/cli
          # استخدام التوكيد لضمان الإرسال للسحابة
          ionic deploy build --app-id="0cdc2a84" --channel="Production" --token="${{ secrets.IONIC_SECRET }}" --commit-msgs="Final Engine Fix" || echo "Appflow upload skipped"

      - [cite_start]name: 5. إضافة منصة أندرويد وتوليد الأيقونات [cite: 4]
        run: |
          npx cap config set webDir dist_web
          npx cap add android
          
          # توليد الأيقونات من المسار العربي الصحيح 
          npx capacitor-assets generate --android \
            --icon-foreground-source "موارد/الرقة/icon-foreground.png" \
            --icon-background-source "موارد/الرقة/icon-background.png" \
            --splash-source "موارد/الرقة/icon-only.png"
          
          # تغيير اسم التطبيق إلى "رقة" 
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_FILE
          npx cap sync android

      - [cite_start]name: 6. حقن ملف google-services.json [cite: 5, 6]
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF

      - name: 7. إصلاح تعارض المكتبات (BouncyCastle Fix)
        run: |
          APP_GRADLE="android/app/build.gradle"
          PROJECT_GRADLE="android/build.gradle"
          MANIFEST=$(find android -name "AndroidManifest.xml" | grep "main" | head -n 1)
          
          # توحيد الهوية [cite: 11]
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_GRADLE
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_GRADLE
          sed -i 's/package="com.roqa.app"/package="com.raqqa.app"/' $MANIFEST
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

          # حل تعارض org.bouncycastle الجذري
          echo "allprojects { configurations.all { resolutionStrategy { eachDependency { details -> if (details.requested.group == 'org.bouncycastle') { details.useVersion '1.77' } } } } } }" >> $PROJECT_GRADLE

      - [cite_start]name: 8. بناء التطبيق (Clean Force) [cite: 14]
        run: |
          cd android
          rm -rf /home/runner/.gradle/caches/jars-9/
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon

      - [cite_start]name: 9. التوقيع الرقمي (Keystore) [cite: 15, 16]
        run: |
          keytool -genkey -v -keystore raqqa_final.jks -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "raqqa_pass_2026" -keypass "raqqa_pass_2026" -dname "CN=RaqqaApp, OU=Dev, O=Raqqa, L=Cairo, S=Egypt, C=EG"
          
          APK_RAW=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/35.0.0/apksigner sign --ks raqqa_final.jks --ks-pass pass:"raqqa_pass_2026" --out Raqqa-Final-Signed.apk "$APK_RAW"
          
          cd android && ./gradlew bundleRelease --no-daemon && cd ..
          AAB_RAW=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -keystore raqqa_final.jks -storepass "raqqa_pass_2026" "$AAB_RAW" raqqa_alias
          cp "$AAB_RAW" Raqqa-Final-Signed.aab

      - [cite_start]name: 10. حفظ الملفات الجاهزة [cite: 17, 18]
        uses: actions/upload-artifact@v4
        with:
          name: Raqqa-Final-Release
          path: |
            Raqqa-Final-Signed.apk
            Raqqa-Final-Signed.aab
            raqqa_final.jks

- name: 7. نقل التحديثات لفرع Updates (مباشرة من الجذر)
        run: |
          # 1. تعريف الهوية
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. الانتقال لفرع updates (سيتم إنشاؤه أو تحديثه)
          git checkout -B updates
          
          # 3. تنظيف الملفات القديمة في الفرع (للبدء من جديد)
          rm -rf ./*
          
          # 4. نسخ الملفات المطلوبة "فقط" من ذاكرة البناء المؤقتة
          # (هذه الملفات ينتجها الكود في الخطوات السابقة تلقائياً)
          cp dist_web/version.json .
          cp update.zip .
          
          # 5. الرفع النهائي
          git add version.json update.zip
          git commit -m "Live Update: Build ${{ github.run_number }}"
          git push origin updates --force

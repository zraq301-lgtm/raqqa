- name: 6. ضبط الـ SDK 35 وحقن الهوية (الحل الشامل)
        run: |
          APP_GRADLE="android/app/build.gradle"
          GRADLE_PROPS="android/gradle.properties"
          STRINGS_XML="android/app/src/main/res/values/strings.xml"
          
          # 1. إجبار Gradle على قبول SDK 35 وتوحيد الإصدار لكل المكتبات (أهم سطر)
          echo "android.suppressUnsupportedCompileSdk=35" >> $GRADLE_PROPS
          echo "android.useAndroidX=true" >> $GRADLE_PROPS
          echo "android.enableJetifier=true" >> $GRADLE_PROPS
          
          # 2. تحديث الـ SDK لـ 35 في التطبيق الأساسي
          sed -i 's/compileSdk .*/compileSdk 35/' $APP_GRADLE
          sed -i 's/targetSdk .*/targetSdk 35/' $APP_GRADLE
          
          # 3. فرض الـ SDK 35 على كل الـ Plugins يدوياً داخل ملفاتهم
          # السطر ده بيلف على كل المكتبات زي Camera و Local Notifications ويحدثهم
          find android -name "build.gradle" -type f -exec sed -i 's/compileSdkVersion .*/compileSdkVersion 35/g' {} +
          find android -name "build.gradle" -type f -exec sed -i 's/compileSdk .*/compileSdk 35/g' {} +
          find android -name "build.gradle" -type f -exec sed -i 's/targetSdkVersion .*/targetSdkVersion 35/g' {} +
          find android -name "build.gradle" -type f -exec sed -i 's/targetSdk .*/targetSdk 35/g' {} +

          # 4. ضبط اسم التطبيق (رقة) واسم الحزمة
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_XML
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_GRADLE
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_GRADLE
          
          # 5. حقن Firebase
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF
          
          npx cap sync android

name: Raqqa Final Production Build (APK + AAB + Assets)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - [cite_start]name: 2. إعداد البيئة (Node 22 & Java 17) [cite: 2]
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - [cite_start]name: 3. تنظيف وتثبيت المكتبات [cite: 3]
        run: |
          rm -rf android
          npm cache clean --force
          npm uninstall @capgo/capacitor-updater @capgo/cli
          npm install --legacy-peer-deps
          npm install @capacitor/assets --save-dev
          npm run build --if-present

      - [cite_start]name: 4. إعداد أندرويد وتوليد الأيقونات (رقة) [cite: 4]
        run: |
          npx cap config set webDir dist_web
          npx cap add android
          
          # استخدام ميزة الحماية للمسارات التي تحتوي على لغة عربية
          RESOURCE_PATH="موارد/الرقة"
          
          npx capacitor-assets generate --android \
            --icon-foreground-source "$RESOURCE_PATH/icon-foreground.png" \
            --icon-background-source "$RESOURCE_PATH/icon-background.png" \
            --splash-source "$RESOURCE_PATH/icon-only.png"
          
          # تغيير اسم التطبيق إلى "رقة" بالعربي 
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_FILE
          
          # ضبط إعدادات الـ SDK 
          VAR_FILE="android/variables.gradle"
          sed -i "s/minSdkVersion = .*/minSdkVersion = 23/" $VAR_FILE
          sed -i "s/compileSdkVersion = .*/compileSdkVersion = 35/" $VAR_FILE
          sed -i "s/targetSdkVersion = .*/targetSdkVersion = 35/" $VAR_FILE
          echo "android.suppressUnsupportedCompileSdk=35" >> android/gradle.properties
          npx cap sync android

      - [cite_start]name: 5. حقن ملف google-services.json [cite: 5, 6, 7]
        shell: bash
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": {
              "project_number": "162488255991",
              "project_id": "raqqa-43dc8",
              "storage_bucket": "raqqa-43dc8.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2",
                  "android_client_info": { "package_name": "com.raqqa.app" }
                },
                "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - [cite_start]name: 6. تهيئة الصلاحيات وتصحيح اسم الحزمة [cite: 10, 11, 12]
        run: |
          MANIFEST=$(find android -name "AndroidManifest.xml" | grep "main" | head -n 1)
          APP_BUILD_GRADLE="android/app/build.gradle"
          
          # توحيد اسم الحزمة 
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/package="com.roqa.app"/package="com.raqqa.app"/' $MANIFEST
          
          # تفعيل Cleartext [cite: 13]
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - [cite_start]name: 7. بناء ملفات APK و AAB [cite: 14]
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - [cite_start]name: 8. التوقيع الرقمي الكامل (Signing) [cite: 15, 16]
        run: |
          keytool -genkey -v -keystore raqqa_release.jks -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "raqqa_pass_2026" -keypass "raqqa_pass_2026" \
            -dname "CN=RaqqaApp, OU=Dev, O=Raqqa, L=Cairo, S=Egypt, C=EG"
          
          APK_RAW=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/35.0.0/apksigner sign --ks raqqa_release.jks \
            --ks-pass pass:"raqqa_pass_2026" --out Raqqa-Final-Signed.apk "$APK_RAW"
          
          AAB_RAW=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -keystore raqqa_release.jks -storepass "raqqa_pass_2026" "$AAB_RAW" raqqa_alias
          cp "$AAB_RAW" Raqqa-Final-Signed.aab

      - [cite_start]name: 9. رفع الملفات الجاهزة [cite: 17, 18]
        uses: actions/upload-artifact@v4
        with:
          name: Raqqa-Final-Release
          path: |
            Raqqa-Final-Signed.apk
            Raqqa-Final-Signed.aab
            raqqa_release.jks

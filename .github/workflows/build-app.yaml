name: Roqa Final Protected Build & Live Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد البيئة (Java 21 - الحل القاطع)
        uses: actions/setup-java@v4
        with:
          java-version: '21' # التحديث لـ 21 يحل مشكلة معالجة مكتبة BouncyCastle
          distribution: 'temurin'

      - name: 3. إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. بناء الويب
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          mkdir -p dist_web
          echo "{\"version\": ${{ github.run_number }}}" > dist_web/version.json

      - name: 5. إنشاء وتكوين مشروع أندرويد
        run: |
          rm -rf android
          npx cap config set webDir dist_web
          npm install @capacitor/android@latest
          npx cap add android
          
          # الحفاظ على Gradle 8.2.1 ليتوافق مع Capacitor
          cat <<EOF > android/variables.gradle
          ext {
              minSdkVersion = 22
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoreVersion = '1.12.0'
              androidxMaterialVersion = '1.10.0'
              coreSplashScreenVersion = '1.0.1'
              firebaseMessagingVersion = '24.0.0'
          }
          EOF

          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'com.google.gms.google-services'
          android {
              namespace "com.raqqa.app"
              compileSdkVersion rootProject.ext.compileSdkVersion
              defaultConfig {
                  applicationId "com.raqqa.app"
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode ${{ github.run_number }}
                  versionName "1.0.${{ github.run_number }}"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              packagingOptions {
                  resources {
                      excludes += ['META-INF/versions/21/org/bouncycastle/**']
                  }
              }
          }
          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation project(':capacitor-android')
              implementation project(':capacitor-cordova-android-plugins')
              implementation "androidx.appcompat:appcompat:\${rootProject.ext.androidxAppCompatVersion}"
              implementation "com.google.firebase:firebase-messaging:\${rootProject.ext.firebaseMessagingVersion}"
              implementation "androidx.core:core-splashscreen:\${rootProject.ext.coreSplashScreenVersion}"
          }
          EOF
          npx cap sync android

      - name: 6. ضبط الهوية والشهادات
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF
          sed -i 's/app_name">.*</app_name">رقة</g' android/app/src/main/res/values/strings.xml || echo "Strings.xml not found"
          
          keytool -genkey -v -keystore release.keystore -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" \
            -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"

      - name: 7. البناء النهائي
        run: |
          cd android && chmod +x gradlew
          # حذف الكاش لضمان بناء نظيف تماماً بـ Java 21
          rm -rf ~/.gradle/caches/jars-9
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password=roqa_pass_2026 \
            -Pandroid.injected.signing.key.alias=raqqa_alias \
            -Pandroid.injected.signing.key.password=roqa_pass_2026

      - name: 8. استخراج الـ APK وتحديث فرع Updates
        run: |
          mkdir -p final_output
          find . -name "*release.apk" -o -name "*release-unsigned.apk" | xargs -I {} cp -v {} final_output/Roqa_Build_${{ github.run_number }}.apk
          zip -r update.zip dist_web/
          cp update.zip final_output/
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B updates
          rm -rf ./*
          cp final_output/Roqa_Build_${{ github.run_number }}.apk .
          cp final_output/update.zip .
          echo "{\"version\": ${{ github.run_number }}}" > version.json
          git add .
          git commit -m "Build ${{ github.run_number }}"
          git push origin updates --force

      - name: 9. رفع الملفات للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Roqa-Package-${{ github.run_number }}
          path: final_output/

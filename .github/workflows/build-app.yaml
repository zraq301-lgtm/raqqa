name: Raqqa Final Shield Fix (BouncyCastle & Deploy Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ASSETS_PATH: "موارد/الرقة"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد البيئة (Java 17 & Node 22)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 3. إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 4. تثبيت المكتبات وبناء الويب
        run: |
          rm -rf android
          npm install --legacy-peer-deps
          npm install @capacitor/live-updates @capacitor/assets@latest --save-dev --legacy-peer-deps
          npm run build --if-present

      - name: 🚀 5. النشر على Ionic Dashboard
        run: |
          npm install -g @ionic/cli
          ionic deploy build --app-id="0cdc2a84" \
                             --channel="Production" \
                             --token="${{ secrets.IONIC_SECRET }}" \
                             --commit-msgs="Fix BouncyCastle Conflict" || echo "Appflow upload skipped"

      - name: 6. إضافة منصة أندرويد وتوليد الأيقونات
        run: |
          npx cap config set webDir dist_web
          npx cap add android
          npx capacitor-assets generate --android --icon "$ASSETS_PATH/icon-only.png" --splash "$ASSETS_PATH/icon-only.png" || npx capacitor-assets generate --android
          
          # تعريب اسم التطبيق
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_FILE
          fi
          npx cap sync android

      - name: 7. حل مشكلة BouncyCastle (المستوى الجذري)
        run: |
          PROJECT_GRADLE="android/build.gradle"
          # إجبار جميع المشاريع الفرعية على استخدام إصدار 1.77 المستقر من المكتبة المتسببة في الخطأ
          echo "
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      eachDependency { details ->
                          if (details.requested.group == 'org.bouncycastle') {
                              details.useVersion '1.77'
                          }
                      }
                  }
              }
          }" >> $PROJECT_GRADLE

      - name: 8. حقن ملفات الإعدادات والهوية
        run: |
          # حقن google-services.json
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF
          
          # تصحيح الـ Namespace
          APP_GRADLE="android/app/build.gradle"
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_GRADLE
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_GRADLE

      - name: 9. بناء وتوقيع التطبيق (Release)
        run: |
          cd android
          # تنظيف الكاش يدوياً قبل البناء لتجنب ملفات الـ Jar التالفة
          rm -rf /home/runner/.gradle/caches/jars-9/
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease --no-daemon

          # التوقيع الرقمي
          keytool -genkey -v -keystore raqqa_final.jks -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "raqqa_pass_2026" -keypass "raqqa_pass_2026" -dname "CN=RaqqaApp, OU=Dev, O=Raqqa, L=Cairo, S=Egypt, C=EG"
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/35.0.0/apksigner sign --ks raqqa_final.jks --ks-pass pass:"raqqa_pass_2026" --out ../Raqqa-Final-Signed.apk "$APK_PATH"

      - name: 10. رفع المخرجات
        uses: actions/upload-artifact@v4
        with:
          name: Raqqa-Production-Package
          path: |
            Raqqa-Final-Signed.apk
            android/raqqa_final.jks

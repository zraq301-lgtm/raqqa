- name: 8. تجهيز الملفات النهائية بشكل مستقل
        run: |
          # إنشاء مجلد مؤقت لوضع الملفات الهامة فيه
          mkdir -p final_output
          
          # البحث عن أي ملف APK ناتج ونسخه للمجلد الجديد باسم واضح
          find android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} final_output/Roqa_Build_${{ github.run_number }}.apk \;
          
          # البحث عن أي ملف AAB ناتج ونسخه للمجلد الجديد باسم واضح
          find android/app/build/outputs/bundle/release/ -name "*.aab" -exec cp {} final_output/Roqa_Store_Build_${{ github.run_number }}.aab \;
          
          # نسخ ملف التحديث الحي
          cp update.zip final_output/ || echo "No update.zip found"

      - name: 9. رفع الملفات (ستجدها في الواجهة فور التحميل)
        uses: actions/upload-artifact@v4
        with:
          name: Roqa-Final-App-${{ github.run_number }}
          path: final_output/
          if-no-files-found: error

name: Roqa Final Production Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: 1. جلب الكود من GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. إعداد البيئة (Node & Java)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. تثبيت المكتبات وبناء مشروع React
        run: |
          npm install --legacy-peer-deps
          # تثبيت أداة الأيقونات محلياً لضمان وجودها
          npm install @capacitor/assets --save-dev
          npm run build --if-present

      - name: 4. إعداد أندرويد وحقن التصاريح (Manifest)
        run: |
          rm -rf android
          npx cap config set webDir dist_web
          npx cap add android
          
          # تعديل الـ AndroidManifest.xml لإضافة التصاريح (الكاميرا، الميكروفون، الصور، Firebase)
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="com.google.android.c2dm.permission.RECEIVE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name="com.raqqa.app.MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="\${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths"></meta-data>
                  </provider>
              </application>
          </manifest>
          EOF

          # إنشاء ملف مسارات الملفات (ضروري لرفع الصور)
          mkdir -p android/app/src/main/res/xml
          echo '<paths><external-path name="my_images" path="." /></paths>' > android/app/src/main/res/xml/file_paths.xml

      - name: 5. توليد الأيقونات من المجلد المحلي
        run: |
          # تأكد من وجود صورة باسم logo.png أو icon.png في مجلد resources أو الجذر
          # هذا الأمر يسحب من الملفات المحلية التي رفعتها أنت على جيت هب
          npx capacitor-assets generate --android

      - name: 6. إعداد ملفات Gradle و ProGuard
        run: |
          # تعديل ملف build.gradle الرئيسي
          cat <<EOF > android/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath 'com.google.gms:google-services:4.4.1'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # تعديل ملف build.gradle الخاص بالتطبيق
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'com.google.gms.google-services'
          android {
              namespace "com.raqqa.app"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.raqqa.app"
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0.${{ github.run_number }}"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation project(':capacitor-android')
              implementation "com.google.firebase:firebase-messaging:24.0.0"
              implementation "androidx.appcompat:appcompat:1.6.1"
          }
          EOF

      - name: 7. ضبط ملف Firebase والاسم
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF
          sed -i 's/app_name">.*</app_name">رقة</g' android/app/src/main/res/values/strings.xml || echo "Strings.xml not found"
          npx cap sync android

      - name: 8. البناء والتوقيع (APK & AAB)
        run: |
          keytool -genkey -v -keystore release.keystore -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" \
            -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          cd android && chmod +x gradlew
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password=roqa_pass_2026 \
            -Pandroid.injected.signing.key.alias=raqqa_alias \
            -Pandroid.injected.signing.key.password=roqa_pass_2026

      - name: 9. رفع الملفات النهائية إلى Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prod-${{ github.run_number }}
          name: Roqa Production v${{ github.run_number }}
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
            release.keystore
          body: "إصدار نهائي مستقر (Production). تم إضافة تصاريح الكاميرا، الميكروفون، والإشعارات، وتوليد الأيقونات محلياً."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

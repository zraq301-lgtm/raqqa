name: Roqa Production Build (Final Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد Java 17 (الأكثر استقراراً للأندرويد)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. تثبيت المكتبات وبناء الويب
        run: |
          rm -rf android
          npm install --legacy-peer-deps
          npm run build --if-present

      - name: 4.5 تجهيز ملفات التحديث (ZIP & JSON)
        run: |
          echo "{\"version\": ${{ github.run_number }}, \"date\": \"$(date)\"}" > dist_web/version.json
          cd dist_web && zip -r ../update.zip . && cd ..

      - name: 5. إضافة الأندرويد وإعداد Gradle
        run: |
          npx cap config set webDir dist_web
          npx cap add android
          npx cap sync android

      - name: 6. ضبط الـ SDK وحقن الهوية (نسخة الاستقرار)
        run: |
          APP_GRADLE="android/app/build.gradle"
          PROJECT_GRADLE="android/build.gradle"
          GRADLE_PROPS="android/gradle.properties"
          STRINGS_XML="android/app/src/main/res/values/strings.xml"
          
          # إجبار المشروع كاملاً على SDK 34 لضمان عمل كل الـ Plugins بدون أخطاء Metadata
          echo "android.useAndroidX=true" >> $GRADLE_PROPS
          echo "android.enableJetifier=true" >> $GRADLE_PROPS
          echo "android.nonTransitiveRClass=false" >> $GRADLE_PROPS
          
          # حقن قاعدة ذهبية لتوحيد الـ SDK في كل المكتبات الفرعية تلقائياً
          cat <<EOF >> $PROJECT_GRADLE
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdk 34
                          buildToolsVersion "34.0.0"
                          defaultConfig {
                              targetSdk 34
                          }
                      }
                  }
              }
          }
          EOF
          
          # تحديث ملف التطبيق الرئيسي
          sed -i 's/compileSdk .*/compileSdk 34/' $APP_GRADLE
          sed -i 's/targetSdk .*/targetSdk 34/' $APP_GRADLE
          
          # ضبط اسم التطبيق (رقة) واسم الحزمة
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_XML
          sed -i "s/applicationId .*/applicationId \"com.raqqa.app\"/" $APP_GRADLE
          sed -i "s/namespace .*/namespace \"com.raqqa.app\"/" $APP_GRADLE
          
          # حقن ملف Firebase
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF
          
          npx cap sync android

      - name: 7. البناء النهائي
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace

      - name: 8. التوقيع الرقمي (بأدوات SDK 34)
        run: |
          keytool -genkey -v -keystore roqa_release.jks -alias roqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" \
            -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          APK_RAW=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks roqa_release.jks \
            --ks-pass pass:"roqa_pass_2026" --out Roqa-Final-Signed.apk "$APK_RAW"
          
          cp android/app/build/outputs/bundle/release/app-release.aab Roqa-Final-Signed.aab

      - name: 9. رفع المخرجات
        uses: actions/upload-artifact@v4
        with:
          name: Roqa-Final-Package
          path: |
            Roqa-Final-Signed.apk
            Roqa-Final-Signed.aab
            update.zip
            dist_web/version.json

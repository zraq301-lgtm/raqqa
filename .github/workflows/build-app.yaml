name: Roqa Production Build Signed (Final with Icons & Arabic Name)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ASSETS_PATH: "موارد/الرقة" # تأكد من وجود أيقونة icon-only.png في هذا المسار

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد البيئة (Node 22 & Java 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu' # توزيعة zulu أكثر استقراراً لعمليات بناء الـ Jar المعقدة

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. تنظيف وتثبيت المكتبات (تشمل التحديثات الحية)
        run: |
          rm -rf android
          npm install --legacy-peer-deps
          # إضافة مكتبات التحديثات الحية والأيقونات والإشعارات
          npm install onesignal-cordova-plugin @capacitor/push-notifications @capacitor/local-notifications @capacitor/live-updates @capacitor/assets --save --legacy-peer-deps
          npm run build --if-present

      - name: 4. إضافة منصة أندرويد وحل مشكلة الـ Build
        run: |
          npx cap config set webDir dist_web
          npx cap add android
          # حل مشكلة فشل إنشاء ملف bcprov-jdk18on التي عطلت البناء سابقاً
          echo "configurations.all { resolutionStrategy.force 'org.bouncycastle:bcprov-jdk18on:1.77' }" >> android/build.gradle

      - name: 5. ضبط اسم التطبيق (رقة) بالعربي وتوليد الأيقونات
        run: |
          # تغيير اسم التطبيق في ملف الأندرويد ليظهر "رقة"
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_FILE
          
          # توليد الأيقونات وصور البداية (Splash)
          # سيبحث عن الأيقونة في المسار المخصص، وإذا لم يجدها سيستخدم الافتراضية
          npx capacitor-assets generate --android --icon "$ASSETS_PATH/icon-only.png" --splash "$ASSETS_PATH/icon-only.png" || npx capacitor-assets generate --android
          
          npx cap sync android

      - name: 6. حقن ملف google-services.json
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF

      - name: 7. تهيئة OneSignal وتصحيح الهوية ودعم الوسائط
        run: |
          MANIFEST=$(find android -name "AndroidManifest.xml" | grep "main" | head -n 1)
          APP_BUILD_GRADLE="android/app/build.gradle"
          
          # إضافة مكتبات OneSignal لدعم الصور في الإشعارات
          sed -i '/dependencies {/a \    implementation "com.onesignal:OneSignal:[4.0.0, 4.99.99]"' $APP_BUILD_GRADLE
          sed -i '/dependencies {/a \    implementation "com.google.firebase:firebase-messaging:23.4.0"' $APP_BUILD_GRADLE
          
          # توحيد اسم الحزمة (Package Name)
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/package="com.roqa.app"/package="com.raqqa.app"/' $MANIFEST
          
          # إضافة الصلاحيات اللازمة
          sed -i '/<application/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          
          # تفعيل مرور البيانات (Cleartext) للتحديثات الحية
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: 8. بناء وتوقيع ملفات APK و AAB (بدون كاش)
        run: |
          cd android
          chmod +x gradlew
          # استخدام --no-build-cache لضمان عدم حدوث تعارض في ملفات التشفير Jar
          ./gradlew assembleRelease bundleRelease --no-daemon --no-build-cache
          
          keytool -genkey -v -keystore roqa_release.jks -alias roqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" \
            -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          APK_RAW=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks roqa_release.jks \
            --ks-pass pass:"roqa_pass_2026" --out ../Roqa-Final-Signed.apk "$APK_RAW"
          
          AAB_RAW=$(find app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -keystore roqa_release.jks -storepass "roqa_pass_2026" "$AAB_RAW" roqa_alias
          cp "$AAB_RAW" ../Roqa-Final-Signed.aab

      - name: 9. رفع الملفات الجاهزة للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Roqa-Production-Package
          path: |
            Roqa-Final-Signed.apk
            Roqa-Final-Signed.aab
            android/roqa_release.jks

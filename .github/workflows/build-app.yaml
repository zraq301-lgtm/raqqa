name: Roqa Final Stable Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد البيئة (Node 22 & Java 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu' # زولو أكثر استقراراً مع مكتبات التشفير
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. تنظيف وتثبيت المكتبات وبناء الويب
        run: |
          rm -rf android
          npm install --legacy-peer-deps
          npm install @capacitor/live-updates@0.5.0 --save --legacy-peer-deps
          npm run build --if-present

      - name: 4. إضافة الأندرويد وإصلاح تعارض التشفير (الجراحة الدقيقة)
        run: |
          npx cap config set webDir dist_web
          npx cap add android
          
          # الانتقال لداخل مجلد أندرويد لتعديل الملفات الرئيسية
          cd android
          
          # إصلاح ملف build.gradle الرئيسي لإجبار نسخة التشفير المستقرة 1.77
          # نستخدم 'sed' للبحث عن سطر 'allprojects' والحقن بداخله مباشرة
          sed -i '/allprojects {/a \    configurations.all { resolutionStrategy.force "org.bouncycastle:bcprov-jdk18on:1.77" }' build.gradle
          
          # منع الـ Live Updates من سحب النسخة 1.79 المكسورة
          echo "configurations.all { resolutionStrategy.force 'org.bouncycastle:bcprov-jdk18on:1.77' }" >> app/build.gradle

      - name: 5. ضبط الاسم العربي (رقة) وحقن Firebase
        run: |
          STRINGS_XML="android/app/src/main/res/values/strings.xml"
          APP_GRADLE="android/app/build.gradle"
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # تغيير الاسم للعربي
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_XML
          
          # توحيد اسم الحزمة
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_GRADLE
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_GRADLE
          
          # حقن google-services.json
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF
          
          npx cap sync android

      - name: 6. البناء النهائي (بدون Daemon وبدون Cache)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon --no-build-cache --stacktrace

      - name: 7. التوقيع الرقمي (Keystore)
        run: |
          keytool -genkey -v -keystore roqa_release.jks -alias roqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" \
            -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          APK_RAW=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks roqa_release.jks \
            --ks-pass pass:"roqa_pass_2026" --out Roqa-Final-Signed.apk "$APK_RAW"
          
          AAB_RAW=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -keystore roqa_release.jks -storepass "roqa_pass_2026" "$AAB_RAW" roqa_alias
          cp "$AAB_RAW" Roqa-Final-Signed.aab

      - name: 8. رفع المخرجات
        uses: actions/upload-artifact@v4
        with:
          name: Roqa-Final-Package
          path: |
            Roqa-Final-Signed.apk
            Roqa-Final-Signed.aab
            roqa_release.jks

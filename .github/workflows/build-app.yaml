name: Roqa Final Production Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. إعداد البيئة (Node & Java)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. تثبيت المكتبات وبناء الويب
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/assets @capacitor/camera @capacitor/push-notifications @capacitor/local-notifications --save
          npm run build --if-present

      - name: 4. إعداد أندرويد وحقن المانيفست
        run: |
          rm -rf android
          npx cap config set webDir dist_web
          npx cap add android
          
          # إنشاء المانيفست بتصاريح كاملة وصحيحة
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name="com.raqqa.app.MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 5. ضبط Gradle (إصلاح تعارض المكتبات)
        run: |
          # تعديل build.gradle الرئيسي
          cat <<EOF > android/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath 'com.google.gms:google-services:4.4.1'
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # تعديل build.gradle الخاص بالتطبيق مع إضافة دعم كامل للمكتبات
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'com.google.gms.google-services'
          android {
              namespace "com.raqqa.app"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.raqqa.app"
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0.${{ github.run_number }}"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation project(':capacitor-android')
              implementation project(':capacitor-cordova-android-plugins')
              implementation "androidx.appcompat:appcompat:1.6.1"
              implementation "com.google.android.material:material:1.10.0"
              implementation "com.google.firebase:firebase-messaging:24.0.0"
          }
          EOF

      - name: 6. توليد الأيقونات ومزامنة الكابتشور
        run: |
          # محاولة توليد الأيقونات (إذا فشلت لا تتوقف العملية)
          npx capacitor-assets generate --android || echo "Icons skipped"
          
          # حقن ملف Firebase
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF
          npx cap sync android

      - name: 7. البناء النهائي (APK & AAB)
        run: |
          keytool -genkey -v -keystore release.keystore -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" \
            -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          cd android && chmod +x gradlew
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password=roqa_pass_2026 \
            -Pandroid.injected.signing.key.alias=raqqa_alias \
            -Pandroid.injected.signing.key.password=roqa_pass_2026

      - name: 8. نشر الإصدار
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prod-v${{ github.run_number }}
          name: Roqa Production v${{ github.run_number }}
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
            release.keystore
          body: "تم إصلاح أخطاء البناء السابقة بنجاح. النسخة تدعم الآن الكاميرا والميكروفون والإشعارات."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

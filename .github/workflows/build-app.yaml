name: Raqqa Final Production Build (APK + AAB + Sign)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد البيئة (Node 22 & Java 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. تنظيف وتثبيت الأدوات
        run: |
          rm -rf android
          npm uninstall @capgo/capacitor-updater @capgo/cli
          npm install --legacy-peer-deps
          # تثبيت أداة توليد الأيقونات
          npm install @capacitor/assets --save-dev
          npm run build --if-present

      - name: 4. إضافة أندرويد وتوليد الأيقونات وتغيير الاسم
        run: |
          npx cap config set webDir dist_web
          npx cap add android
          
          # توليد الأيقونات من مسار resources
          npx capacitor-assets generate --android --icon-source "resources/icon-only.png" --splash-source "resources/icon-background.png"
          
          # تغيير اسم التطبيق إلى "رقة" بالعربي في ملف Strings
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_FILE
          
          VAR_FILE="android/variables.gradle"
          sed -i "s/minSdkVersion = .*/minSdkVersion = 23/" $VAR_FILE
          sed -i "s/compileSdkVersion = .*/compileSdkVersion = 35/" $VAR_FILE
          sed -i "s/targetSdkVersion = .*/targetSdkVersion = 35/" $VAR_FILE
          echo "android.suppressUnsupportedCompileSdk=35" >> android/gradle.properties
          npx cap sync android

      - name: 5. حقن ملف google-services.json
        shell: bash
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": {
              "project_number": "162488255991",
              "project_id": "raqqa-43dc8",
              "storage_bucket": "raqqa-43dc8.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2",
                  "android_client_info": { "package_name": "com.raqqa.app" }
                },
                "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ],
                "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: 6. ضبط الـ Manifest والهوية
        run: |
          APP_BUILD_GRADLE="android/app/build.gradle"
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/package="com.roqa.app"/package="com.raqqa.app"/' $MANIFEST
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: 7. بناء ملفات APK و AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: 8. التوقيع الرقمي الكامل (Signing)
        run: |
          # إنشاء ملف التوقيع
          keytool -genkey -v -keystore raqqa_production.jks -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "raqqa_pass_2026" -keypass "raqqa_pass_2026" \
            -dname "CN=RaqqaApp, OU=Dev, O=Raqqa, L=Cairo, S=Egypt, C=EG"
          
          # توقيع APK
          APK_RAW=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/35.0.0/apksigner sign --ks raqqa_production.jks \
            --ks-pass pass:"raqqa_pass_2026" --out Raqqa-Signed.apk "$APK_RAW"
          
          # توقيع AAB (للمتجر)
          AAB_RAW=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -keystore raqqa_production.jks -storepass "raqqa_pass_2026" "$AAB_RAW" raqqa_alias
          cp "$AAB_RAW" Raqqa-Signed.aab

      - name: 9. حفظ جميع الملفات النهائية
        uses: actions/upload-artifact@v4
        with:
          name: Raqqa-Final-Release-Packages
          path: |
            Raqqa-Signed.apk
            Raqqa-Signed.aab
            raqqa_production.jks

name: Raqqa Final Shield Fix (Production Build)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # تعريف المسار العربي هنا لضمان عدم تعطل الـ Bash
  ASSETS_PATH: "موارد/الرقة"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد البيئة (Java 17 & Node 22)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. تنظيف وتثبيت المكتبات
        run: |
          rm -rf android
          npm install --legacy-peer-deps
          npm install @capacitor/assets @capacitor/live-updates @capacitor/push-notifications @capacitor/local-notifications --save-dev --legacy-peer-deps
          npm run build --if-present

      - name: 🚀 4. تحديث Appflow (اختياري)
        run: |
          npm install -g @ionic/cli
          ionic deploy build --app-id="0cdc2a84" --channel="Production" --token="${{ secrets.IONIC_SECRET }}" --commit-msgs="Engine Fix" || echo "Appflow upload skipped"

      - name: 5. إضافة منصة أندرويد وتوليد الأيقونات
        run: |
          npx cap config set webDir dist_web
          npx cap add android
          
          # استخدام المتغير لضمان قراءة المجلد العربي "موارد/الرقة"
          npx capacitor-assets generate --android \
            --icon-foreground-source "$ASSETS_PATH/icon-foreground.png" \
            --icon-background-source "$ASSETS_PATH/icon-background.png" \
            --splash-source "$ASSETS_PATH/icon-only.png"
          
          # تغيير اسم التطبيق إلى "رقة"
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_FILE
          npx cap sync android

      - name: 6. حقن ملف google-services.json
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF

      - name: 7. ضبط الهوية وإصلاح BouncyCastle
        run: |
          APP_GRADLE="android/app/build.gradle"
          PROJECT_GRADLE="android/build.gradle"
          MANIFEST=$(find android -name "AndroidManifest.xml" | grep "main" | head -n 1)
          
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_GRADLE
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_GRADLE
          sed -i 's/package="com.roqa.app"/package="com.raqqa.app"/' $MANIFEST
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

          echo "allprojects { configurations.all { resolutionStrategy { eachDependency { details -> if (details.requested.group == 'org.bouncycastle') { details.useVersion '1.77' } } } } } }" >> $PROJECT_GRADLE

      - name: 8. بناء التطبيق (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease --no-daemon

      - name: 9. التوقيع الرقمي الصارم
        run: |
          # توليد مفتاح جديد باسم رقة
          keytool -genkey -v -keystore raqqa.jks -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "raqqa_pass_2026" -keypass "raqqa_pass_2026" -dname "CN=RaqqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          # البحث عن ملف الـ APK وتوقيعه
          APK_PATH=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/35.0.0/apksigner sign --ks raqqa.jks --ks-pass pass:"raqqa_pass_2026" --out Raqqa-Signed.apk "$APK_PATH"
          
          # توقيع ملف الـ AAB للمتجر
          AAB_PATH=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -keystore raqqa.jks -storepass "raqqa_pass_2026" "$AAB_PATH" raqqa_alias
          cp "$AAB_PATH" Raqqa-Signed.aab

      - name: 10. رفع المخرجات
        uses: actions/upload-artifact@v4
        with:
          name: Raqqa-Ready-Packages
          path: |
            Raqqa-Signed.apk
            Raqqa-Signed.aab
            raqqa.jks

name: Roqa Production Build (Ultimate Fix - BouncyCastle Resolve)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ASSETS_PATH: "موارد/الرقة"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد البيئة (Java 17 & Node 22)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu' # توزيعة Zulu هي الأكثر توافقاً مع مكتبات التشفير

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. تنظيف الكاش السحابي (هذا هو مفتاح الحل)
        run: |
          # حذف أي بقايا لملفات التشفير المتعلقة بـ Gradle في السيرفر
          rm -rf ~/.gradle/caches/jars-9/
          rm -rf ~/.gradle/caches/modules-2/files-2.1/org.bouncycastle

      - name: 4. تثبيت المكتبات وبناء الويب
        run: |
          rm -rf android
          npm install --legacy-peer-deps
          # تثبيت المكتبات مع التأكد من توافق الإصدارات
          npm install onesignal-cordova-plugin @capacitor/push-notifications @capacitor/local-notifications @capacitor/live-updates @capacitor/assets --save --legacy-peer-deps
          npm run build --if-present

      - name: 5. إضافة الأندرويد وحقن إصلاح التوافقية
        run: |
          npx cap config set webDir dist_web
          npx cap add android
          
          # إجبار Gradle على استخدام إصدار 1.77 (المستقر) بدلاً من 1.79 الذي يسبب الخطأ
          echo "subprojects {
              configurations.all {
                  resolutionStrategy.force 'org.bouncycastle:bcprov-jdk18on:1.77'
              }
          }" >> android/build.gradle

      - name: 6. ضبط اسم التطبيق (رقة) بالعربي والأيقونات
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_FILE
          
          # توليد الأيقونات (سيستخدم الافتراضي إذا لم يجد الملف)
          npx capacitor-assets generate --android --icon "$ASSETS_PATH/icon-only.png" --splash "$ASSETS_PATH/icon-only.png" || npx capacitor-assets generate --android
          npx cap sync android

      - name: 7. حقن ملف google-services.json وتصحيح الهوية
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF
          
          APP_BUILD_GRADLE="android/app/build.gradle"
          MANIFEST=$(find android -name "AndroidManifest.xml" | grep "main" | head -n 1)
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: 8. بناء وتوقيع الملفات (بدون Daemon وبدون Cache)
        run: |
          cd android
          chmod +x gradlew
          # البناء النظيف تماماً لتجنب خطأ التشفير
          ./gradlew assembleRelease bundleRelease --no-daemon --no-build-cache
          
          keytool -genkey -v -keystore roqa_release.jks -alias roqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" \
            -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          APK_RAW=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks roqa_release.jks --ks-pass pass:"roqa_pass_2026" --out ../Roqa-Final-Signed.apk "$APK_RAW"
          
          AAB_RAW=$(find app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -keystore roqa_release.jks -storepass "roqa_pass_2026" "$AAB_RAW" roqa_alias
          cp "$AAB_RAW" ../Roqa-Final-Signed.aab

      - name: 9. رفع المخرجات
        uses: actions/upload-artifact@v4
        with:
          name: Roqa-Production-Package
          path: |
            Roqa-Final-Signed.apk
            Roqa-Final-Signed.aab
            android/roqa_release.jks

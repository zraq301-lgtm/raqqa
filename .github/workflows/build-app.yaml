name: Roqa Final Protected Build & Live Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # إضافة صلاحيات الكتابة لتمكين الـ Action من رفع ملفات التحديث للمستودع
    permissions:
      contents: write

    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. إعداد البيئة (Node & Java)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. بناء الويب وتوليد رقم الإصدار
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          # إنشاء ملف الإصدار برقم بناء GitHub التصاعدي
          echo "{\"version\": ${{ github.run_number }}}" > dist_web/version.json
          echo "Build Version: ${{ github.run_number }}"

      - name: 4. توليد مشروع الأندرويد وحقن الحماية
        run: |
          rm -rf android
          # التأكد من وجود مجلد dist_web
          mkdir -p dist_web
          npx cap config set webDir dist_web
          npx cap add android
          
          # أ. ضبط المتغيرات البرمجية
          cat <<EOF > android/variables.gradle
          ext {
              minSdkVersion = 22
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoreVersion = '1.12.0'
              androidxMaterialVersion = '1.10.0'
              coreSplashScreenVersion = '1.0.1'
              firebaseMessagingVersion = '24.0.0'
          }
          EOF

          # ب. تحديث build.gradle وتفعيل R8/ProGuard للحماية
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'com.google.gms.google-services'

          android {
              namespace "com.raqqa.app"
              compileSdkVersion rootProject.ext.compileSdkVersion
              defaultConfig {
                  applicationId "com.raqqa.app"
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode ${{ github.run_number }}
                  versionName "1.0.${{ github.run_number }}"
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation project(':capacitor-android')
              implementation project(':capacitor-cordova-android-plugins')
              implementation "androidx.appcompat:appcompat:\${rootProject.ext.androidxAppCompatVersion}"
              implementation "com.google.firebase:firebase-messaging:\${rootProject.ext.firebaseMessagingVersion}"
              implementation "androidx.core:core-splashscreen:\${rootProject.ext.coreSplashScreenVersion}"
          }
          EOF

          # ج. قواعد ProGuard لحماية كود رقة ومنع تعطل الإضافات
          cat <<EOF > android/app/proguard-rules.pro
          -keep class com.getcapacitor.** { *; }
          -keep class * extends com.getcapacitor.Plugin
          -keep class com.google.firebase.** { *; }
          -dontwarn com.google.firebase.**
          EOF

          npx cap sync android

      - name: 5. تخصيص الهوية (Firebase & Arabic Name)
        run: |
          # حقن ملف إعدادات Firebase
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF

          # تغيير اسم التطبيق إلى "رقة" في الأندرويد
          sed -i 's/Raqqa/رقة/g' android/app/src/main/res/values/strings.xml

      - name: 6. البناء والتوقيع الرقمي للمتجر
        run: |
          # تجهيز ملف التحديث الحي
          zip -r update.zip dist_web/
          
          # إنشاء مفتاح توقيع مؤقت (Keystore)
          keytool -genkey -v -keystore release.keystore -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" \
            -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          cd android && chmod +x gradlew
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password=roqa_pass_2026 \
            -Pandroid.injected.signing.key.alias=raqqa_alias \
            -Pandroid.injected.signing.key.password=roqa_pass_2026

      - name: 7. نقل التحديثات إلى فرع Updates (لحل مشكلة الـ 404)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # إنشاء مجلد مؤقت للملفات التي سيتم الوصول إليها عبر الرابط
          mkdir -p public_updates
          cp dist_web/version.json public_updates/
          cp update.zip public_updates/
          
          # الرفع إلى فرع منفصل يسمى updates
          git checkout -B updates
          rm -rf ./*
          cp -r public_updates/* .
          git add version.json update.zip
          git commit -m "Live Update: Build ${{ github.run_number }}"
          git push origin updates --force

      - name: 8. رفع الملفات النهائية (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Roqa-Production-Package
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
            update.zip

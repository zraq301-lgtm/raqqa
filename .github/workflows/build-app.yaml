name: Roqa Out-Of-The-Box Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد البيئة
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. بناء الويب (Vite)
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present

      - name: 4. توليد مشروع الأندرويد (The Nuclear Fix)
        run: |
          rm -rf android
          # التأكد من وجود مجلد dist_web قبل المزامنة
          mkdir -p dist_web
          npx cap config set webDir dist_web
          npx cap add android
          
          # أ. حقن ملف variables.gradle
          cat <<EOF > android/variables.gradle
          ext {
              minSdkVersion = 22
              compileSdkVersion = 34
              targetSdkVersion = 34
              androidxActivityVersion = '1.8.0'
              androidxAppCompatVersion = '1.6.1'
              androidxCoreVersion = '1.12.0'
              androidxMaterialVersion = '1.10.0'
              androidxBrowserVersion = '1.6.0'
              androidxLocalBroadcastManagerVersion = '1.1.0'
              androidxExifInterfaceVersion = '1.3.6'
              androidxCoordinatorLayoutVersion = '1.2.0'
              coreSplashScreenVersion = '1.0.1'
              googlePlayServicesLocationVersion = '21.0.1'
              firebaseMessagingVersion = '24.0.0'
          }
          EOF

          # ب. تحديث build.gradle الخاص بالتطبيق لدعم Firebase واسم الحزمة
          cat <<EOF > android/app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'com.google.gms.google-services'

          android {
              namespace "com.raqqa.app"
              compileSdkVersion rootProject.ext.compileSdkVersion
              defaultConfig {
                  applicationId "com.raqqa.app"
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode 1
                  versionName "1.0"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }

          dependencies {
              implementation fileTree(dir: 'libs', include: ['*.jar'])
              implementation "androidx.appcompat:appcompat:\${rootProject.ext.androidxAppCompatVersion}"
              implementation "androidx.core:core-ktx:\${rootProject.ext.androidxCoreVersion}"
              implementation project(':capacitor-android')
              implementation project(':capacitor-cordova-android-plugins')
              implementation "com.google.firebase:firebase-messaging:\${rootProject.ext.firebaseMessagingVersion}"
              implementation "androidx.core:core-splashscreen:\${rootProject.ext.coreSplashScreenVersion}"
          }
          EOF

          npx cap sync android

      - name: 5. ضبط الهوية وحقن Firebase
        run: |
          # ضبط اسم التطبيق بالعربي (رقة) - استخدام معالج أكثر دقة لـ XML
          sed -i 's/Raqqa/رقة/g' android/app/src/main/res/values/strings.xml
          
          # حقن ملف google-services.json
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF

      - name: 6. البناء النهائي والتوقيع (The Combined Step)
        run: |
          # ضغط نسخة الويب للتحديثات
          zip -r update.zip dist_web/
          
          # إنشاء مفتاح التوقيع
          keytool -genkey -v -keystore release.keystore -alias raqqa_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "raqqa_pass_2026" -keypass "raqqa_pass_2026" \
            -dname "CN=RaqqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          
          cd android
          chmod +x gradlew
          # البناء باستخدام Gradle مع تمرير مفاتيح التوقيع مباشرة
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore \
            -Pandroid.injected.signing.store.password=raqqa_pass_2026 \
            -Pandroid.injected.signing.key.alias=raqqa_alias \
            -Pandroid.injected.signing.key.password=raqqa_pass_2026

      - name: 7. تجميع الملفات النهائية
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk Raqqa-Final-Signed.apk
          cp android/app/build/outputs/bundle/release/app-release.aab Raqqa-Final-Signed.aab

      - name: 8. الرفع النهائي
        uses: actions/upload-artifact@v4
        with:
          name: Raqqa-Final-Build
          path: |
            Raqqa-Final-Signed.apk
            Raqqa-Final-Signed.aab
            update.zip

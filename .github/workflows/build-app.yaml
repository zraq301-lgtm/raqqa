name: Roqa Production Build (Live Web Enabled)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ASSETS_PATH: "موارد/الرقة"
  # استبدل YOUR_USERNAME باسم حسابك في جت هب
  WEB_URL: "https://YOUR_USERNAME.github.io/raqqa/"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. جلب الكود
        uses: actions/checkout@v4

      - name: 2. إعداد البيئة (Node 22 & Java 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. تثبيت المكتبات وبناء الويب
        run: |
          rm -rf android
          npm install --legacy-peer-deps
          npm install @capacitor/assets@latest onesignal-cordova-plugin @capacitor/push-notifications --save --legacy-peer-deps
          npm run build --if-present

      - name: 4. ضبط Capacitor للعمل مع رابط GitHub (مهم جداً)
        run: |
          # هذا السطر يخبر التطبيق أن يقرأ من الرابط بدلاً من الملفات الداخلية
          npx cap config set server.url "$WEB_URL"
          npx cap config set server.allowNavigation '["*.github.io"]'
          npx cap config set webDir dist_web
          npx cap add android

      - name: 5. ضبط اسم التطبيق بالعربي (رقة) والأيقونات
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">رقة<\/string>/' $STRINGS_FILE
          npx capacitor-assets generate --android --icon "$ASSETS_PATH/icon-only.png" --splash "$ASSETS_PATH/icon-only.png" || npx capacitor-assets generate --android
          npx cap sync android

      - name: 6. حقن ملف google-services.json
        run: |
          cat <<EOF > android/app/google-services.json
          {
            "project_info": { "project_number": "162488255991", "project_id": "raqqa-43dc8", "storage_bucket": "raqqa-43dc8.firebasestorage.app" },
            "client": [ { "client_info": { "mobilesdk_app_id": "1:162488255991:android:73d6299f11a1b7aec61af2", "android_client_info": { "package_name": "com.raqqa.app" } }, "api_key": [ { "current_key": "AIzaSyAKjsgnoHnGGr3urhm6Kpu7RvxN2dp6sJQ" } ], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } } ],
            "configuration_version": "1"
          }
          EOF

      - name: 7. تصحيح الهوية وتفعيل Cleartext (لضمان عمل الرابط)
        run: |
          APP_BUILD_GRADLE="android/app/build.gradle"
          MANIFEST=$(find android -name "AndroidManifest.xml" | grep "main" | head -n 1)
          sed -i 's/applicationId "com.roqa.app"/applicationId "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/namespace "com.roqa.app"/namespace "com.raqqa.app"/' $APP_BUILD_GRADLE
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' $MANIFEST

      - name: 8. بناء وتوقيع ملفات APK و AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon
          keytool -genkey -v -keystore roqa_release.jks -alias roqa_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "roqa_pass_2026" -keypass "roqa_pass_2026" -dname "CN=RoqaApp, OU=Dev, O=Roqa, L=Cairo, S=Egypt, C=EG"
          APK_RAW=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks roqa_release.jks --ks-pass pass:"roqa_pass_2026" --out ../Roqa-Live-Signed.apk "$APK_RAW"
          AAB_RAW=$(find app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -keystore roqa_release.jks -storepass "roqa_pass_2026" "$AAB_RAW" roqa_alias
          cp "$AAB_RAW" ../Roqa-Live-Signed.aab

      - name: 9. رفع المخرجات
        uses: actions/upload-artifact@v4
        with:
          name: Roqa-Live-Package
          path: |
            Roqa-Live-Signed.apk
            Roqa-Live-Signed.aab
            android/roqa_release.jks

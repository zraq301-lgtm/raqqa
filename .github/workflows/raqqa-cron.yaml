name: "Raqqa Cron Job"

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  run_notifications:
    runs-on: ubuntu-latest
    steps:
      # --- الوظيفة الناجحة (جلب من نيون والإرسال) ---
      - name: "Call Raqqa API (Original GET)"
        run: |
          curl -X GET "https://raqqa-hjl8.vercel.app/api/get-notifications" \
          -H "Content-Type: application/json" \
          -H "zazotona: 12sonds25" \
          -v

      # --- الوظيفة المعدلة (وردبريس بنفس تنسيق نيون) ---
      - name: "Check WordPress Categories and Push to FCM"
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const categoryIds = ["189211019", "788402012", "768006428"];
              
              for (const catId of categoryIds) {
                console.log(`Checking category: ${catId}`);
                
                const wpUrl = `https://public-api.wordpress.com/wp/v2/sites/raqqastor3.wordpress.com/posts?categories=${catId}&per_page=1`;
                const response = await fetch(wpUrl);
                const posts = await response.json();

                if (posts && posts.length > 0) {
                  const post = posts[0];
                  
                  // تنظيف العنوان من وسوم HTML
                  const cleanTitle = post.title.rendered.replace(/<\/?[^>]+(>|$)/g, "");
                  
                  // ملاحظة: قمنا بتغيير المسميات لتطابق ما يخرج من نيون عادةً
                  // استبدلنا 'id' بـ 'notification_id' أو أي مسمى يستخدمه الـ API الخاص بك
                  const payload = {
                    title: "✨ " + cleanTitle,
                    message: "اكتشفي أسرار الأناقة والجمال الجديدة الآن..",
                    url: post.link,
                    image: post.jetpack_featured_media_url || "",
                    type: "wordpress", // لتمييز المصدر
                    post_id: String(post.id)
                  };

                  console.log(`Sending WP Post to FCM API:`, JSON.stringify(payload));

                  const res = await fetch("https://raqqa-hjl8.vercel.app/api/send-fcm", {
                    method: "POST",
                    headers: {
                      "Content-Type": "application/json",
                      "zazotona": "12sonds25"
                    },
                    body: JSON.stringify(payload) // نرسل الـ Payload بدون تغليف إضافي كما يفعل نيون
                  });

                  const resData = await res.text();
                  console.log(`Status: ${res.status}, Response: ${resData}`);
                }
              }
            } catch (error) {
              console.error("Critical Error:", error);
              core.setFailed(error.message);
            }

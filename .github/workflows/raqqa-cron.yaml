name: "Raqqa Cron Job"

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  run_notifications:
    runs-on: ubuntu-latest
    steps:
      - name: "Call Raqqa API (Original GET)"
        run: |
          curl -X GET "https://raqqa-hjl8.vercel.app/api/get-notifications" \
          -H "Content-Type: application/json" \
          -H "zazotona: 12sonds25" \
          -v

      - name: "Check WordPress Categories and Push to FCM"
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const categoryIds = ["189211019", "788402012", "768006428"];
              
              for (const catId of categoryIds) {
                console.log(`Checking category: ${catId}`);
                
                const wpUrl = `https://public-api.wordpress.com/wp/v2/sites/raqqastor3.wordpress.com/posts?categories=${catId}&per_page=1`;
                const response = await fetch(wpUrl);
                const posts = await response.json();

                if (posts && posts.length > 0) {
                  const post = posts[0];
                  
                  // الهيكل المحدث المتوافق مع Firebase V1 لتجنب خطأ 400
                  const payload = {
                    message: {
                      topic: "all_users",
                      notification: {
                        title: "✨ مقال جديد: " + post.title.rendered.replace(/<\/?[^>]+(>|$)/g, ""),
                        body: "اكتشفي أسرار الأناقة والجمال الجديدة الآن..",
                        image: post.jetpack_featured_media_url || ""
                      },
                      data: {
                        id: String(post.id),
                        url: post.link,
                        type: "wordpress_article"
                      }
                    }
                  };

                  console.log(`Sending Payload for Category ${catId}`);

                  const res = await fetch("https://raqqa-hjl8.vercel.app/api/send-fcm", {
                    method: "POST",
                    headers: {
                      "Content-Type": "application/json",
                      "zazotona": "12sonds25"
                    },
                    body: JSON.stringify(payload)
                  });

                  const resData = await res.text();
                  console.log(`Category ${catId} - Status: ${res.status}, Response: ${resData}`);
                }
              }
            } catch (error) {
              console.error("Critical Error:", error);
              core.setFailed(error.message);
            }

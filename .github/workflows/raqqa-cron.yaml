name: "Raqqa Smart Sync (Neon Only)"

on:
  schedule:
    # التنفيذ مرتين يومياً (الساعة 6 صباحاً و 6 مساءً بالتوقيت العالمي)
    - cron: "0 6,18 * * *"
  workflow_dispatch: # يتيح لك تشغيل الأكشن يدوياً للتجربة من تبويب Actions

jobs:
  sync_process:
    runs-on: ubuntu-latest
    steps:
      - name: "Run Raqqa Neon Sync"
        uses: actions/github-script@v7
        with:
          script: |
            const vercelUrl = "https://raqqa-hjl8.vercel.app/api/get-notifications";
            const headers = { 
              "Content-Type": "application/json", 
              "zazotona": "12sonds25" 
            };

            try {
              // --- الخطوة الوحيدة: جلب إشعارات نيون المجدولة (GET) ---
              console.log("--- Step 1: Fetching Scheduled Notifications from Neon ---");
              
              const neonRes = await fetch(vercelUrl, { 
                method: "GET", 
                headers 
              });

              if (!neonRes.ok) {
                throw new Error(`Server responded with status: ${neonRes.status}`);
              }

              const neonData = await neonRes.json();
              console.log("Neon Sync Result:", JSON.stringify(neonData));

              console.log("--- Neon Sync Task Completed Successfully ---");

            } catch (error) {
              console.error("Critical Sync Error:", error.message);
              core.setFailed(error.message);
            }

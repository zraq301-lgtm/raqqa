name: "Raqqa Smart Sync (Neon & WordPress)"

on:
  schedule:
    # التنفيذ كل 12 ساعة (الساعة 6 صباحاً و 6 مساءً بالتوقيت العالمي)
    - cron: "0 6,18 * * *"
  workflow_dispatch: # زر التشغيل اليدوي للتجربة

jobs:
  sync_process:
    runs-on: ubuntu-latest
    steps:
      # --- الوظيفة الأولى: جلب الإشعارات المجدولة من نيون وإرسالها ---
      - name: "1. Trigger Neon Scheduled Notifications"
        run: |
          echo "جاري جلب الإشعارات المجدولة من قاعدة بيانات نيون..."
          curl -X GET "https://raqqa-hjl8.vercel.app/api/get-notifications" \
          -H "Content-Type: application/json" \
          -H "zazotona: 12sonds25" \
          -v

      # --- الوظيفة الثانية: فحص وردبريس وإرسال المقالات الجديدة ---
      - name: "2. Check WordPress & Sync to Vercel"
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const categoryIds = ["189211019", "788402012", "768006428"];
              const siteDomain = "raqqastor3.wordpress.com";
              const vercelApi = "https://raqqa-hjl8.vercel.app/api/get-notifications"; // نفس الرابط لأنه يعالج POST الآن

              for (const catId of categoryIds) {
                console.log(`Checking WordPress Category: ${catId}`);
                
                // جلب أحدث مقال من وردبريس
                const wpUrl = `https://public-api.wordpress.com/wp/v2/sites/${siteDomain}/posts?categories=${catId}&per_page=1`;
                const wpRes = await fetch(wpUrl);
                const posts = await wpRes.json();

                if (posts && posts.length > 0) {
                  const post = posts[0];
                  
                  // تنظيف العنوان من وسوم HTML
                  const cleanTitle = post.title.rendered.replace(/<\/?[^>]+(>|$)/g, "").trim();
                  
                  // تجهيز البيانات المتوافقة مع تحديث كود Vercel الأخير
                  const payload = {
                    type: "wordpress_article",
                    postId: String(post.id),
                    title: "✨ مقال جديد: " + cleanTitle,
                    body: "اكتشفي أسرار الأناقة والجمال الجديدة في رقة..",
                    image: post.jetpack_featured_media_url || "",
                    category: "general" 
                  };

                  console.log(`Sending Post ${post.id} to Vercel for verification...`);

                  // إرسال البيانات لـ Vercel ليقوم بفحص التكرار في نيون والإرسال لـ Firebase
                  const res = await fetch(vercelApi, {
                    method: "POST",
                    headers: {
                      "Content-Type": "application/json",
                      "zazotona": "12sonds25"
                    },
                    body: JSON.stringify(payload)
                  });

                  const result = await res.json();
                  console.log(`Vercel Response for ${catId}:`, JSON.stringify(result));
                } else {
                  console.log(`No posts found in category ${catId}`);
                }
              }
            } catch (error) {
              console.error("Critical Error in WordPress Sync:", error.message);
              core.setFailed(error.message);
            }

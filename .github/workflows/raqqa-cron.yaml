name: "Raqqa Cron Job"

on:
  schedule:
    # سيتم التنفيذ الساعة 9 صباحاً و 9 مساءً بتوقيت القاهرة
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  run_notifications:
    runs-on: ubuntu-latest
    steps:
      # --- الخطوة الأولى: الكود الأصلي (لا تغيير) ---
      - name: "Call Raqqa API"
        run: |
          curl -X GET "https://raqqa-hjl8.vercel.app/api/get-notifications" \
          -H "Content-Type: application/json" \
          -H "zazotona: 12sonds25" \
          -v

      # --- الخطوة الثانية: فحص وردبريس والدفع بتنسيق JSON سليم ---
      - name: "Check WordPress and Push to FCM"
        run: |
          # 1. جلب بيانات أحدث مقال
          WP_DATA=$(curl -s "https://public-api.wordpress.com/wp/v2/sites/raqqastor3.wordpress.com/posts?per_page=1")
          
          # 2. استخراج البيانات وتحويلها لـ JSON آمن (Safe JSON) لتجنب خطأ 400
          # نستخدم Python لإنشاء الـ Body بالكامل لضمان عدم وجود أخطاء في الرموز أو الفواصل
          PAYLOAD=$(echo $WP_DATA | python3 -c "
import sys, json
data = json.load(sys.stdin)
if data:
    post = data[0]
    payload = {
        'type': 'wordpress_new_post',
        'id': str(post.get('id', '')),
        'title': post.get('title', {}).get('rendered', 'مقال جديد'),
        'url': post.get('link', ''),
        'image': post.get('jetpack_featured_media_url', '')
    }
    print(json.dumps(payload))
else:
    print('')
")

          # 3. إرسال البيانات إذا كانت موجودة
          if [ ! -z "$PAYLOAD" ]; then
            echo "Payload prepared: $PAYLOAD"
            
            curl -X POST "https://raqqa-hjl8.vercel.app/api/send-fcm" \
            -H "Content-Type: application/json" \
            -H "zazotona: 12sonds25" \
            -d "$PAYLOAD" \
            -v
          else
            echo "No new posts found."
          fi

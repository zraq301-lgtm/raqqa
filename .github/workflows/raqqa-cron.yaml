name: "Raqqa Firebase Notification Dispatcher"

on:
  schedule:
    # سيتم التنفيذ كل ساعة (على رأس كل ساعة) لضمان معالجة الإشعارات المجدولة أولاً بأول
    - cron: "0 * * * *"
  workflow_dispatch: # يتيح لك تشغيل الأكشن يدوياً في أي وقت للتجربة

jobs:
  process_notifications:
    runs-on: ubuntu-latest
    steps:
      - name: "Call Raqqa Process API"
        uses: actions/github-script@v7
        with:
          script: |
            // رابط ملف جلب ومعالجة الإشعارات الجديد الخاص بك
            const vercelUrl = "https://raqqa-hjl8.vercel.app/api/get-notifications";
            
            const headers = { 
              "Content-Type": "application/json"
              // إذا كنت تستخدم مفتاح أمان (Header) أضفه هنا، وإلا اتركها هكذا
            };

            try {
              console.log("--- Starting Firebase Notification Fetch & AI Process ---");
              
              const response = await fetch(vercelUrl, { 
                method: "GET", 
                headers 
              });

              const data = await response.json();

              if (!response.ok) {
                throw new Error(`Server Error: ${response.status} - ${JSON.stringify(data)}`);
              }

              console.log("Success Result:", JSON.stringify(data));
              
              if (data.processed_count > 0) {
                console.log(`✅ Successfully processed ${data.processed_count} notifications.`);
              } else {
                console.log("ℹ️ No pending notifications to process at this time.");
              }

            } catch (error) {
              console.error("❌ Action Failed:", error.message);
              core.setFailed(error.message);
            }

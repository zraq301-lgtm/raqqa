<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>تطبيق رقة - النسخة النسائية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; background-color: #fcfcfc; font-family: 'Tajawal', sans-serif; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script>
      // تنبيه فوري للتأكد أن الملف تم تحديثه
      alert("جاري تشغيل نظام الإعلانات... انتظر 10 ثوانٍ");

      window.startAppTag = function() {
        (window.startAppTag.q = window.startAppTag.q || []).push(arguments);
      };

      window.startAppTag('onReceiveAd', function() {
        alert("✅ مبروك: الإعلان جاهز للعرض!");
      });

      window.startAppTag('onFailedToReceiveAd', function() {
        alert("❌ فشل الطلب: المنصة لم ترسل إعلاناً حالياً.");
      });

      // طلب الإعلان بعد 10 ثوانٍ
      window.onload = function() {
        setTimeout(function() {
          if (window.startAppTag) {
            window.startAppTag('showAd');
          }
        }, 10000);
      };
    </script>
    <script async src="https://www.start.io/js/sdk.js?publisherId=127253367&appId=203477356"></script>

    <script type="module" src="./src/main.jsx"></script>
</body>
</html>
